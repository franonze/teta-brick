<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teta Brick</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">

        <!-- MAIN VIEW: REGISTRO -->
        <main id="view-registro" class="view active">
            <h2 class="view-title">Toma del Pecho</h2>
            <!-- Top Section (Nursing) -->
            <section class="glass-card nursing-section">
                <div class="grid-container">
                    <!-- Left Column -->
                    <div class="column left-col">
                        <h2 class="col-title" style="font-size: 1.3rem;">Izquierdo</h2>
                        <button class="play-btn" id="btn-left" aria-label="Iniciar pecho izquierdo">
                            <svg viewBox="0 0 24 24" class="icon-play">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <div class="stats">
                            <div class="stat-row">
                                <span class="label tag">Tiempo</span>
                                <span class="value" id="time-left">00:00</span>
                            </div>
                            <div class="stat-row time-clickable" data-target="hour-left">
                                <span class="label tag">Hora</span>
                                <span class="value time-display" id="hour-left">--:--</span>
                            </div>
                        </div>
                        <button class="control-btn" id="btn-reset-left" style="margin-top: 2px; padding: 4px 8px;">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path
                                    d="M17.65 6.35A7.95 7.95 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                            </svg>
                            <span style="font-size: 0.8rem;">Reset</span>
                        </button>
                    </div>

                    <div class="divider-col"
                        style="display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px;">
                        <div class="divider" style="height: 100%; min-height: 40px; margin: 0;"></div>
                        <button class="control-btn swap-btn" id="btn-swap" aria-label="Invertir tiempos">
                            <svg viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
                                <path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z" />
                            </svg>
                        </button>
                        <div class="divider" style="height: 100%; min-height: 40px; margin: 0;"></div>
                    </div>

                    <!-- Right Column -->
                    <div class="column right-col">
                        <h2 class="col-title" style="font-size: 1.3rem;">Derecho</h2>
                        <button class="play-btn" id="btn-right" aria-label="Iniciar pecho derecho">
                            <svg viewBox="0 0 24 24" class="icon-play">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                        </button>
                        <div class="stats">
                            <div class="stat-row">
                                <span class="label tag">Tiempo</span>
                                <span class="value" id="time-right">00:00</span>
                            </div>
                            <div class="stat-row time-clickable" data-target="hour-right">
                                <span class="label tag">Hora</span>
                                <span class="value time-display" id="hour-right">--:--</span>
                            </div>
                        </div>
                        <button class="control-btn" id="btn-reset-right" style="margin-top: 2px; padding: 4px 8px;">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path
                                    d="M17.65 6.35A7.95 7.95 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                            </svg>
                            <span style="font-size: 0.8rem;">Reset</span>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Middle Section (Next Feeding) -->
            <section class="glass-card next-feeding-section" style="align-items: center;">
                <div style="width: fit-content; display: flex; flex-direction: column; gap: 10px;">
                    <div class="input-group-row" style="flex-direction: row; align-items: center; justify-content: center; gap: 15px; width: auto;">
                        <label style="margin: 0; font-size: 1rem;">Próxima toma:</label>
                        <div style="display: flex; gap: 5px; justify-content: flex-end; align-items: center;">
                            <input type="number" id="next-feeding-hours" min="0" value="4" style="width: 50px; padding: 6px; font-size: 1rem;">
                            <span style="font-weight: 600; color: var(--text-secondary); font-size: 0.9rem;">h</span>
                            <input type="number" id="next-feeding-minutes" min="0" max="59" value="0" style="width: 50px; padding: 6px; font-size: 1rem;">
                            <span style="font-weight: 600; color: var(--text-secondary); font-size: 0.9rem;">m</span>
                        </div>
                    </div>
                    <div class="next-time-display"
                        style="display: flex; align-items: center; justify-content: center; position: relative; padding: 10px; width: 100%; box-sizing: border-box;">
                        <span class="value highlight" id="next-feeding-time" style="font-size: 1.3rem;">--:--</span>
                        <button class="control-btn" id="btn-reset-next"
                            style="position: absolute; right: 8px; margin: 0; padding: 4px;"
                            aria-label="Resetear próxima toma">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                                <path
                                    d="M17.65 6.35A7.95 7.95 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                            </svg>
                        </button>
                    </div>
                </div>
            </section>

            <!-- Bottom Section (Diaper) -->
            <section class="glass-card diaper-section">
                <div class="diaper-row">
                    <button class="diaper-btn poop-btn" id="btn-diaper">
                        <span class="emoji">💩</span>
                        <span class="btn-text">Cambio de pañal</span>
                    </button>
                    <div class="time-label time-clickable" data-target="time-diaper">
                        <span class="label tag">Hora</span>
                        <span class="value time-display" id="time-diaper">--:--</span>
                    </div>
                </div>
            </section>

            <!-- Action Section -->
            <button class="main-action-btn" id="btn-registrar" style="padding: 12px;">
                REGISTRAR
            </button>
        </main>

        <!-- MAIN VIEW: HISTORIAL -->
        <main id="view-historial" class="view">
            <h2 class="view-title">Historial</h2>

            <!-- History List -->
            <section class="history-list" id="history-container">
                <!-- Timeline items injected via JS -->
            </section>
        </main>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav glass-nav">
            <button class="nav-item active" data-target="view-registro">
                <svg viewBox="0 0 24 24" class="nav-icon">
                    <path d="M12 3L4 9v12h16V9l-8-6zm6 16h-3v-6H9v6H6v-9l6-4.5 6 4.5v9z" />
                </svg>
                <span>Registro</span>
            </button>
            <button class="nav-item" data-target="view-historial">
                <svg viewBox="0 0 24 24" class="nav-icon">
                    <path
                        d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z" />
                </svg>
                <span>Historial</span>
            </button>
        </nav>
    </div>

    <!-- Time Selection Popup -->
    <div id="time-modal" class="time-popup-overlay">
        <div class="time-popup-box glass-card">
            <h3 style="text-align: center; margin-bottom: 10px;">Introduce la hora</h3>
            <div class="time-inputs">
                <input type="number" id="modal-hour" min="0" max="23" placeholder="HH">
                <span>:</span>
                <input type="number" id="modal-minute" min="0" max="59" placeholder="MM">
            </div>
            <div class="popup-actions">
                <button id="modal-cancel" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button id="modal-save" class="main-action-btn"
                    style="padding: 12px; width: auto; flex: 1; border-radius: 12px; font-size: 1rem;">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Confirm Delete Popup -->
    <div id="delete-modal" class="time-popup-overlay">
        <div class="time-popup-box glass-card">
            <h3 style="text-align: center; margin-bottom: 10px;">¿Borrar registro?</h3>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 10px;">Esta acción no se puede deshacer.</p>
            <div class="popup-actions">
                <button id="delete-cancel" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button id="delete-confirm" class="main-action-btn"
                    style="padding: 12px; width: auto; flex: 1; border-radius: 12px; font-size: 1rem; background: #ef4444;">Borrar</button>
            </div>
        </div>
    </div>

    <!-- Edit Event Popup -->
    <div id="edit-modal" class="time-popup-overlay">
        <div class="time-popup-box glass-card">
            <h3 style="text-align: center; margin-bottom: 10px;">Editar registro</h3>
            
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                    <label class="sub-label" style="text-align: center;">Hora</label>
                    <div class="time-inputs">
                        <input type="number" id="edit-hour" min="0" max="23" placeholder="HH">
                        <span>:</span>
                        <input type="number" id="edit-minute" min="0" max="59" placeholder="MM">
                    </div>
                </div>
                
                <div id="edit-duration-container" style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
                    <label class="sub-label" style="text-align: center;">Duración (minutos)</label>
                    <input type="number" id="edit-duration" min="0" placeholder="Min" style="width: 100px; padding: 10px; border-radius: 12px; background: rgba(0,0,0,0.2); border: 1px solid var(--card-border); color: white; text-align: center; font-size: 1.2rem; font-family: inherit; outline: none;">
                </div>
            </div>

            <div class="popup-actions" style="margin-top: 10px;">
                <button id="edit-cancel" class="btn-secondary" style="flex: 1;">Cancelar</button>
                <button id="edit-save" class="main-action-btn"
                    style="padding: 12px; width: auto; flex: 1; border-radius: 12px; font-size: 1rem;">Guardar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
